name: Daily Anime Update

on:
  schedule:
    # Run at 00:30 UTC (6:00 AM IST) and 12:30 UTC (6:00 PM IST)
    - cron: '30 0,12 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-episodes:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit changes
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use modern Node that has native fetch()

      - name: Run update script
        run: node scripts/update-episodes.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Nihar"
          git config --global user.email "nr8280@srmist.edu.in"
          git add data/
          git commit -m "Automated update of anime episodes [skip ci]" || echo "No changes to commit"
          git push
